# 公开基础配置 - 此文件可以安全上传到GitHub
# 开发环境使用application-dev.yml中的配置会覆盖此处的配置
# 请复制application-example.yml为application-dev.yml并填入敏感配置

spring:
  application:
    name: agent
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: jdbc:mysql://${config.db.host}:${config.db.port}/${config.db.database}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: ${config.db.username}
    password: ${config.db.password}
    # 也就是“翻译官”，让Java能跟MySQL说话
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${config.redis.host}
      port: ${config.redis.port}
      password: ${config.redis.password}

server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-stacktrace: never

# 日志配置
logging:
  level:
    # 根日志级别
    root: WARN
    # 应用包日志级别 - 只显示关键业务日志
    com.xiaoce.agent: INFO
    com.xiaoce.agent.auth: INFO
    # Spring框架日志级别 - 只显示警告和错误
    org.springframework: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    # 数据库相关日志
    org.hibernate: ERROR
    org.mybatis: WARN
    # Redis相关日志
    org.springframework.data.redis: WARN
  pattern:
    # 简洁的控制台日志格式 - 只保留时间、级别和消息
    console: "%d{HH:mm:ss} %-5level - %msg%n"
    # 文件日志格式 - 稍微详细一些
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{20} - %msg%n"
  file:
    name: logs/agent.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

auth:
  jwt:
    issuer: academic-agent
    key-id: academic-agent
    private-key: classpath:keys/rsa-private.pem
    public-key: classpath:keys/rsa-public.pem
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
  verification:
    code-length: 6
    ttl: PT5M
    max-attempts: 5
    send-interval: PT60S
    daily-limit: 10
  password:
    bcrypt-strength: 12
    min-length: 8
    max-length: 12

# 配置 MP 日志（可选，方便查看生成的 SQL）
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
