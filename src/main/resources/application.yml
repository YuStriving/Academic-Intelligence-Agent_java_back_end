spring:
  application:
    name: agent
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/agent_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: 127.0.0.1
      port: 6380
      password: 123456
      database: 0
      timeout: 5s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-stacktrace: never

# 日志配置
logging:
  level:
    # 根日志级别
    root: INFO
    # 应用包日志级别
    com.xiaoce.agent: DEBUG
    com.xiaoce.agent.auth: DEBUG
    # Spring框架日志级别
    org.springframework: WARN
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    # 数据库相关日志
    org.hibernate: WARN
    org.mybatis: DEBUG
    # Redis相关日志
    org.springframework.data.redis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/agent.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

auth:
  jwt:
    issuer: academic-agent
    key-id: academic-agent
    private-key: classpath:keys/rsa-private.pem
    public-key: classpath:keys/rsa-public.pem
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
  verification:
    code-length: 6         # 验证码长度：6位 (如 123456)
    ttl: PT5M              # 有效期：5分钟 (5分钟内不填就作废)
    max-attempts: 5        # 最大尝试次数：5次 (输错5次就锁死，防暴力破解)
    send-interval: PT60S   # 发送间隔：60秒 (点了一次后，60秒内不能再点)
    daily-limit: 10        # 每日上限：10次 (防止有人恶意刷你的短信费)
  #  这是 BCrypt 算法的“计算成本”参数。数字越大，加密一次越慢，黑客暴力破解就越难。系统中 “未来注册的所有用户” 的密码管理策略。
  password:
    bcrypt-strength: 12
    min-length: 8   # 最小长度：密码至少8位
    max-length: 12

oss:
  endpoint:
  access-key-id:
  access-key-secret:
  bucket-name:

# 配置 MP 日志（可选，方便查看生成的 SQL）
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true



