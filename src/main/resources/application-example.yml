# 开发环境配置示例 - 请将此文件复制为 application-dev.yml 并填入真实配置
# application-dev.yml 已添加到 .gitignore，不会上传到GitHub

spring:
  application:
    name: agent
  profiles:
    active: dev
  datasource:
    # MySQL数据库配置
    url: jdbc:mysql://127.0.0.1:3306/agent_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: your_password_here  # 请修改为你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      # Redis配置
      host: 127.0.0.1
      port: 6380
      password: your_redis_password_here  # 请修改为你的Redis密码
      database: 0
      timeout: 5s
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-stacktrace: never

# 日志配置
logging:
  level:
    # 根日志级别
    root: WARN
    # 应用包日志级别 - 只显示关键业务日志
    com.xiaoce.agent: INFO
    com.xiaoce.agent.auth: INFO
    # Spring框架日志级别 - 只显示警告和错误
    org.springframework: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    # 数据库相关日志
    org.hibernate: ERROR
    org.mybatis: WARN
    # Redis相关日志
    org.springframework.data.redis: WARN
  pattern:
    # 简洁的控制台日志格式 - 只保留时间、级别和消息
    console: "%d{HH:mm:ss} %-5level - %msg%n"
    # 文件日志格式 - 稍微详细一些
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{20} - %msg%n"
  file:
    name: logs/agent.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

auth:
  jwt:
    issuer: academic-agent
    key-id: academic-agent
    private-key: classpath:keys/rsa-private.pem
    public-key: classpath:keys/rsa-public.pem
    access-token-ttl: PT15M
    refresh-token-ttl: P7D
  verification:
    code-length: 6
    ttl: PT5M
    max-attempts: 5
    send-interval: PT60S
    daily-limit: 10
  password:
    bcrypt-strength: 12
    min-length: 8
    max-length: 12

oss:
  endpoint:
  access-key-id:
  access-key-secret:
  bucket-name:

# 配置 MP 日志（可选，方便查看生成的 SQL）
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
